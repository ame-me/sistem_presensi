services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
      NEXT_PUBLIC_UPLOAD_BASE_URL: http://localhost:8080/uploads
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DB_HOST: db
      DB_NAME: presensipander_db
      DB_USER: root
      DB_PASSWORD: root
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/html/api
      - ./uploads:/var/www/html/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: presensipander_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    image: phpmyadmin:5-apache
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  web_node_modules:
  web_next:
