<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UAT Questionnaire - Presensi Pander</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --primary: #0f2d6b;
            --primary-light: #eaf0ff;
            --accent: #3b82f6;
            --success: #10b981;
            --success-bg: #ecfdf5;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --warning: #f59e0b;
            --warning-bg: #fffbeb;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --bg-app: #f8fafc;
            --card-bg: #ffffff;
            --border: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-app);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 100px;
        }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, #1e40af 100%);
            color: white;
            padding: 40px 20px 80px;
            text-align: center;
        }

        .header-content h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .header-content p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .container {
            max-width: 1100px;
            margin: -50px auto 0;
            padding: 0 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
        }

        .stat-card .label {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .stat-card .value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary);
        }

        .completion-card {
            grid-column: span 2;
        }

        .progress-container {
            background: #e2e8f0;
            height: 10px;
            border-radius: 5px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-bar {
            background: var(--success);
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
        }

        .role-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 10px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab-btn:hover {
            background: var(--bg-app);
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        .action-bar {
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: var(--radius-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .search-box {
            flex: 1;
            margin-right: 20px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font-family: inherit;
            outline: none;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-main);
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .section-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .section-card summary {
            padding: 24px;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .section-meta {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .tag.role {
            background: var(--primary-light);
            color: var(--primary);
        }

        .tag.state-relevant {
            background: var(--success-bg);
            color: var(--success);
        }

        .tag.state-irrelevant {
            background: #f1f5f9;
            color: var(--text-muted);
        }

        .question-grid {
            padding: 0 24px 24px;
        }

        .question-head {
            display: grid;
            grid-template-columns: 100px 1fr 220px 250px;
            gap: 20px;
            padding: 15px 0;
            border-bottom: 2px solid var(--border);
            font-weight: 700;
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .question-row {
            display: grid;
            grid-template-columns: 100px 1fr 220px 250px;
            gap: 20px;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
        }

        .code-cell {
            font-weight: 700;
            color: var(--primary);
        }

        .question-text {
            font-weight: 500;
            margin-bottom: 8px;
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            background: #f1f5f9;
            color: var(--text-muted);
        }

        .status-pill.pass {
            background: var(--success-bg);
            color: var(--success);
        }

        .status-pill.fail {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .answer-options {
            display: flex;
            gap: 10px;
        }

        .answer-pill {
            flex: 1;
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            font-size: 0.875rem;
            font-weight: 600;
            transition: all 0.2s;
            position: relative;
        }

        .answer-pill input {
            position: absolute;
            opacity: 0;
        }

        .answer-pill.success:hover {
            background: var(--success-bg);
            border-color: var(--success);
        }

        .answer-pill.fail:hover {
            background: var(--danger-bg);
            border-color: var(--danger);
        }

        .answer-pill.success.selected {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .answer-pill.fail.selected {
            background: var(--danger);
            color: white;
            border-color: var(--danger);
        }

        .note-cell textarea {
            width: 100%;
            height: 80px;
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 10px;
            font-family: inherit;
            resize: none;
            outline: none;
        }

        .is-irrelevant {
            opacity: 1;
            filter: none;
        }

        .summary-section {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            padding: 40px;
            margin-top: 40px;
            box-shadow: var(--shadow);
            display: none;
        }

        .summary-section.visible {
            display: block;
        }

        .summary-alert {
            padding: 20px;
            border-radius: var(--radius-md);
            margin-bottom: 30px;
            font-weight: 700;
        }

        .summary-alert.info {
            background: var(--primary-light);
            color: var(--primary);
        }

        .summary-alert.warn {
            background: var(--warning-bg);
            color: var(--warning);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th,
        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        th {
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        .result-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.75rem;
        }

        .result-badge.pass {
            background: var(--success-bg);
            color: var(--success);
        }

        .result-badge.fail {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .floating-actions {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            gap: 15px;
        }

        .settings-panel {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: inherit;
            outline: none;
        }

        @media print {

            .action-bar,
            .floating-actions,
            .settings-panel,
            .section-card summary::-webkit-details-marker {
                display: none !important;
            }

            body {
                padding: 0;
                background: white;
            }

            .container {
                margin-top: 0;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header-content">
            <h1>UAT Questionnaire</h1>
            <p>Presensi Pander - Sistem Presensi Siswa Real-time</p>
        </div>
    </header>

    <div class="container">
        <div class="settings-panel">
            <div class="form-group">
                <label>Sistem / Proyek</label>
                <input type="text" id="systemName" value="Presensi Pander" />
            </div>
            <div class="form-group">
                <label>Tanggal Pengujian</label>
                <input type="date" id="uatDate" />
            </div>
            <div class="form-group">
                <label>Nama Penguji</label>
                <input type="text" id="testerName" placeholder="Masukkan nama Anda" />
            </div>
            <div class="form-group">
                <label>Role Penguji</label>
                <select id="testerRole">
                    <option value="admin">Administrator</option>
                    <option value="guru">Guru / Wali Kelas</option>
                    <option value="ortu">Orang Tua Siswa</option>
                    <option value="kepsek">Kepala Sekolah</option>
                    <option value="it">IT Support / Developer</option>
                </select>
            </div>
            <div class="form-group" style="display:none;">
                <label>Portal Uji</label>
                <select id="portalType">
                    <option value="admin">Admin Portal</option>
                    <option value="guru">Guru Portal</option>
                    <option value="ortu">Monitoring App</option>
                    <option value="it">System Mgmt</option>
                </select>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="label">Total Skenario</span>
                <span class="value" id="totalQuestions">0</span>
            </div>
            <div class="stat-card">
                <span class="label">Skenario Terisi</span>
                <span class="value" id="answeredQuestions">0</span>
            </div>
            <div class="stat-card">
                <span class="label">Berhasil</span>
                <span class="value" style="color:var(--success)" id="passedQuestions">0</span>
            </div>
            <div class="stat-card">
                <span class="label">Gagal</span>
                <span class="value" style="color:var(--danger)" id="failedQuestions">0</span>
            </div>
            <div class="stat-card completion-card">
                <span class="label">Progress Pengujian</span>
                <span class="value" id="completionRate">0%</span>
                <div class="progress-container">
                    <div class="progress-bar" id="completionBar"></div>
                </div>
            </div>
        </div>

        <div class="role-tabs" id="roleTabs">
            <button class="tab-btn active" data-role="admin">Admin</button>
            <button class="tab-btn" data-role="guru">Guru</button>
            <button class="tab-btn" data-role="ortu">Orang Tua</button>
            <button class="tab-btn" data-role="kepsek">Kepala Sekolah</button>
            <button class="tab-btn" data-role="it">IT Support</button>
        </div>

        <div class="action-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cari kode atau fitur..." />
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn btn-primary" id="autoFillBtn" style="background:var(--primary)">Jalankan Simulasi UAT
                    (Realistis)</button>
                <button class="btn btn-outline" id="expandAllBtn">Expand All</button>
                <button class="btn btn-outline" id="collapseAllBtn">Collapse All</button>
                <button class="btn btn-outline" style="color:var(--danger)" id="resetAnswersBtn">Reset Data</button>
            </div>
        </div>

        <div id="sectionsContainer">
            <!-- JS will render sections here -->
        </div>

        <div id="summaryOutput" class="summary-section">
            <div class="section-title" style="margin-bottom:20px; font-size:1.75rem;">Summary Hasil Pengujian</div>
            <div id="summaryAlert" class="summary-alert"></div>

            <table>
                <thead>
                    <tr>
                        <th>No</th>
                        <th>Modul / Fitur</th>
                        <th>Pertanyaan Skenario & Catatan</th>
                        <th>Hasil Akhir</th>
                    </tr>
                </thead>
                <tbody id="summaryTableBody"></tbody>
            </table>

            <div style="margin-top:30px; display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                <div>
                    <h3 style="margin-bottom:10px;">Daftar Temuan Gagal:</h3>
                    <ul id="failedList" style="padding-left:20px; color:var(--danger);"></ul>
                </div>
                <div class="form-group">
                    <label>Catatan Umum / Rekomendasi</label>
                    <textarea id="generalNotes"
                        style="width:100%; height:100px; padding:10px; border-radius:8px; border:1px solid var(--border);"></textarea>
                </div>
            </div>

            <div class="form-group" style="margin-top:20px;">
                <label>Keputusan UAT</label>
                <select id="recommendation">
                    <option value="Sistem Layak Go-Live">GO-LIVE (Siap Digunakan)</option>
                    <option value="Sistem Layak Go-Live dengan Catatan">GO-LIVE dengan Perbaikan Minor</option>
                    <option value="Sistem Belum Layak">REJECT (Butuh Perbaikan Major)</option>
                </select>
            </div>

            <div style="margin-top:30px; display:flex; gap:15px;">
                <button class="btn btn-primary" id="printSummaryBtn">Cetak Laporan (Print/PDF)</button>
            </div>
        </div>
    </div>

    <div class="floating-actions">
        <button class="btn btn-primary" id="finishBtn"
            style="padding:15px 30px; border-radius:30px; box-shadow:0 10px 20px rgba(15,45,107,0.3)">
            Selesaikan Pengujian
        </button>
    </div>

    <script>
        const sections = [
            {
                id: "sec-auth",
                title: "Keamanan Akses (Login & Logout)",
                roles: "Semua Role",
                questions: [
                    { code: "AUTH-01", text: "Apakah pengguna bisa masuk (login) dengan lancar menggunakan nomor induk dan kata sandi yang benar?" },
                    { code: "AUTH-03", text: "Apakah sistem memberikan pesan peringatan yang jelas dan mudah dipahami jika nomor induk atau sandi yang dimasukkan salah?" },
                    { code: "AUTH-04", text: "Setelah menekan tombol 'Keluar', apakah akun benar-benar tertutup dan tidak bisa dibuka tanpa login ulang?" },
                ],
            },
            {
                id: "sec-admin-master",
                title: "Pengelolaan Data Sekolah",
                roles: "Admin",
                questions: [
                    { code: "MST-02", text: "Apakah nama mata pelajaran dan jumlah jam belajarnya tersimpan dengan benar?" },
                    { code: "MST-03", text: "Apakah daftar siswa di setiap kelas otomatis terupdate jika ada siswa yang pindah atau masuk baru?" },
                    { code: "MST-04", text: "Apakah data penting seperti alamat dan nama orang tua tersimpan dengan lengkap dan rapi?" },
                ],
            },
            {
                id: "sec-jadwal",
                title: "Pengaturan Jadwal Pelajaran",
                roles: "Admin",
                questions: [
                    { code: "JAD-01", text: "Apakah Admin bisa menyusun jadwal pelajaran untuk setiap kelas dari Senin sampai Jumat dengan mudah?" },
                    { code: "JAD-02", text: "Apakah muncul peringatan jika ada satu guru yang dijadwalkan mengajar di dua kelas berbeda pada jam yang sama?" },
                    { code: "JAD-03", text: "Apakah sistem mencegah satu ruangan kelas dipakai oleh dua mata pelajaran yang berbeda secara bersamaan?" },
                    { code: "JAD-04", text: "Dapatkah jadwal yang sudah dibuat dicetak atau disimpan dalam bentuk file PDF untuk dibagikan?" },
                ],
            },
            {
                id: "sec-guru-presensi",
                title: "Absensi Kelas (Jurnal Guru)",
                roles: "Guru",
                questions: [
                    { code: "PRES-01", text: "Apakah guru dapat memilih status kehadiran (Hadir, Sakit, Izin, atau Alpa) dengan mudah untuk setiap siswa?" },
                    { code: "PRES-02", text: "Apakah guru bisa memberikan catatan tambahan pada siswa tertentu (misal: 'Siswa pulang lebih awal')?" },
                    { code: "PRES-03", text: "Apakah sistem otomatis menghitung total siswa yang hadir dan tidak hadir agar guru tidak perlu menghitung manual?" },
                    { code: "PRES-04", text: "Apakah muncul pesan konfirmasi yang jelas setelah guru selesai menekan tombol 'Simpan Absensi'?" },
                    { code: "PRES-05", text: "Dapatkah guru melihat kembali daftar kehadiran yang baru saja diisi untuk memastikan tidak ada kesalahan input?" },
                ],
            },
            {
                id: "sec-ortu-monitoring",
                title: "Pantauan Orang Tua & Notifikasi WA",
                roles: "Orang Tua",
                questions: [
                    { code: "MON-02", text: "Dapatkah orang tua melihat foto surat dokter atau bukti izin yang dikirimkan untuk anaknya?" },
                    { code: "MON-03", text: "Apakah ada grafik yang memudahkan orang tua melihat berapa kali anaknya masuk atau alpa dalam sebulan?" },
                    { code: "MON-04", text: "Apakah data absensi anak dijamin rahasia dan tidak bisa dilihat oleh orang tua siswa lain?" },
                ],
            },
            {
                id: "sec-izin",
                title: "Pengajuan Izin & Sakit",
                roles: "Guru & Orang Tua",
                questions: [
                    { code: "IZIN-01", text: "Apakah form izin bisa digunakan untuk meminta izin lebih dari satu hari (misal: sakit selama 3 hari)?" },
                    { code: "IZIN-02", text: "Apakah sistem menolak jika berkas bukti izin yang dikirim tidak sesuai format?" },
                    { code: "IZIN-03", text: "Apakah setiap izin harus disetujui dulu oleh Admin sebelum dianggap sah?" },
                    { code: "IZIN-04", text: "Dapatkah Admin melihat riwayat izin siswa sebagai bahan penilaian kedisiplinan di akhir semester?" },
                ],
            },
            {
                id: "sec-kepsek",
                title: "Pantauan Kepala Sekolah",
                roles: "Kepala Sekolah",
                questions: [
                    { code: "KPS-01", text: "Dapatkah Kepala Sekolah melihat rangkuman berapa persen siswa yang hadir di seluruh sekolah hari ini?" },
                    { code: "KPS-03", text: "Dapatkah Kepala Sekolah melihat perbandingan tingkat kehadiran antar bulan untuk bahan evaluasi?" },
                    { code: "KPS-04", text: "Apakah Kepala Sekolah bisa menyetujui laporan bulanan secara digital langsung di dalam sistem?" },
                ],
            },
            {
                id: "sec-rekap",
                title: "Laporan & Rekapitulasi",
                roles: "Admin & Kepala Sekolah",
                questions: [
                    { code: "REP-01", text: "Apakah sistem bisa menampilkan rangkuman kehadiran seluruh siswa dalam satu bulan secara otomatis?" },
                    { code: "REP-03", text: "Apakah laporan bisa disaring (filter) berdasarkan kelas atau tanggal tertentu sesuai kebutuhan sekolah?" },
                    { code: "REP-04", text: "Apakah total jumlah Hadir, Sakit, Izin, dan Alpa sudah otomatis terhitung dengan benar dalam laporan?" },
                ],
            },
            {
                id: "sec-it-mgmt",
                title: "Pemeliharaan & Jejak Sistem",
                roles: "IT Support",
                questions: [
                    { code: "SYS-02", text: "Apakah waktu di sistem berjalan secara real time" },
                    { code: "SYS-03", text: "Meskipun data sudah ribuan, apakah pencarian nama siswa tetap berjalan cepat?" },
                ],
            },
            {
                id: "sec-rbac",
                title: "Hak Akses & Keamanan Data",
                roles: "Semua Role",
                questions: [
                    { code: "RBAC-01", text: "Apakah folder rahasia sistem benar-benar tidak bisa dibuka oleh sembarang orang melalui internet?" },
                    { code: "RBAC-02", text: "Apakah sistem mencegah kiriman data palsu dari luar aplikasi yang bisa merusak database?" },
                ],
            },
        ];

        const sectionsContainer = document.getElementById("sectionsContainer");
        const totalQuestionsEl = document.getElementById("totalQuestions");
        const answeredQuestionsEl = document.getElementById("answeredQuestions");
        const passedQuestionsEl = document.getElementById("passedQuestions");
        const failedQuestionsEl = document.getElementById("failedQuestions");
        const completionBar = document.getElementById("completionBar");
        const summaryOutput = document.getElementById("summaryOutput");
        const summaryTableBody = document.getElementById("summaryTableBody");
        const summaryAlert = document.getElementById("summaryAlert");
        const failedList = document.getElementById("failedList");
        const searchInput = document.getElementById("searchInput");
        const testerRoleEl = document.getElementById("testerRole");
        const portalTypeEl = document.getElementById("portalType");
        const systemNameEl = document.getElementById("systemName");
        const uatDateEl = document.getElementById("uatDate");
        const testerNameEl = document.getElementById("testerName");
        const deviceInfoEl = document.getElementById("deviceInfo");
        const scenarioInfoEl = document.getElementById("scenarioInfo");
        const generalNotesEl = document.getElementById("generalNotes");
        const recommendationEl = document.getElementById("recommendation");

        // Initialize date
        uatDateEl.value = new Date().toISOString().split('T')[0];

        function renderSections() {
            sectionsContainer.innerHTML = "";
            sections.forEach((section) => {
                const card = document.createElement("details");
                card.className = "section-card";
                card.id = section.id;
                card.open = true;

                const summary = document.createElement("summary");
                summary.innerHTML = `
                <div class="section-head">
                    <div class="section-title">${section.title}</div>
                    <div class="section-meta">
                        <span class="tag role">${section.roles}</span>
                        <span class="tag state-relevant" data-scope-tag="${section.id}">Sesuai Scope</span>
                    </div>
                </div>
                <div class="section-count" data-count-for="${section.id}">0 / ${section.questions.length} diisi</div>
            `;
                card.appendChild(summary);

                const grid = document.createElement("div");
                grid.className = "question-grid";

                const head = document.createElement("div");
                head.className = "question-head";
                head.innerHTML = `
                <div>Kode</div>
                <div>Pertanyaan Skenario</div>
                <div>Hasil Pengujian</div>
                <div>Catatan Temuan</div>
            `;
                grid.appendChild(head);

                section.questions.forEach((q) => {
                    const row = document.createElement("div");
                    row.className = "question-row";
                    row.setAttribute("data-search", `${q.code} ${section.title} ${q.text}`.toLowerCase());

                    row.innerHTML = `
                    <div class="code-cell">${q.code}</div>
                    <div class="question-cell">
                        <div class="question-text">${q.text}</div>
                        <div class="status-pill" data-status-pill="${q.code}">
                            <span class="status-icon" data-status-icon="${q.code}">-</span>
                            <span data-status-text="${q.code}">Belum diisi</span>
                        </div>
                    </div>
                    <div class="answer-group">
                        <div class="answer-options">
                            <label class="answer-pill success" data-answer-label="${q.code}-pass">
                                <input type="radio" name="${q.code}" value="pass" onchange="updateAnswer('${q.code}', 'pass')">
                                Berhasil
                            </label>
                            <label class="answer-pill fail" data-answer-label="${q.code}-fail">
                                <input type="radio" name="${q.code}" value="fail" onchange="updateAnswer('${q.code}', 'fail')">
                                Gagal
                            </label>
                        </div>
                    </div>
                    <div class="note-cell">
                        <textarea placeholder="Catatan..." data-note="${q.code}" oninput="updateSummaryCards()"></textarea>
                    </div>
                `;
                    grid.appendChild(row);
                });

                card.appendChild(grid);
                sectionsContainer.appendChild(card);
            });
            updateSummaryCards();
        }

        window.updateAnswer = function (code, status) {
            const row = document.querySelector(`input[name="${code}"]`).closest(".question-row");
            const pill = document.querySelector(`[data-status-pill="${code}"]`);
            const icon = document.querySelector(`[data-status-icon="${code}"]`);
            const text = document.querySelector(`[data-status-text="${code}"]`);

            row.classList.remove("status-pass", "status-fail");
            pill.classList.remove("pass", "fail");

            document.querySelectorAll(`[data-answer-label^="${code}-"]`).forEach(l => l.classList.remove("selected"));
            document.querySelector(`[data-answer-label="${code}-${status}"]`).classList.add("selected");

            if (status === "pass") {
                row.classList.add("status-pass");
                pill.classList.add("pass");
                icon.textContent = "✓";
                text.textContent = "Berhasil";
            } else {
                row.classList.add("status-fail");
                pill.classList.add("fail");
                icon.textContent = "✕";
                text.textContent = "Gagal";
            }

            updateSummaryCards();
            updateSectionProgress();
        };

        function updateSectionProgress() {
            sections.forEach((section) => {
                const total = section.questions.length;
                const answered = section.questions.filter(q => document.querySelector(`input[name="${q.code}"]:checked`)).length;
                const counter = document.querySelector(`[data-count-for="${section.id}"]`);
                if (counter) counter.textContent = `${answered} / ${total} diisi`;
            });
        }

        function updateSummaryCards() {
            const allRadios = document.querySelectorAll("input[type='radio']:checked");
            const visibleRows = document.querySelectorAll(".section-card:not(.is-irrelevant) .question-row");
            const total = visibleRows.length;

            let answered = 0;
            let passed = 0;
            let failed = 0;

            allRadios.forEach(rb => {
                const row = rb.closest(".section-card");
                if (!row.classList.contains("is-irrelevant")) {
                    answered++;
                    if (rb.value === "pass") passed++;
                    else if (rb.value === "fail") failed++;
                }
            });

            totalQuestionsEl.textContent = total;
            answeredQuestionsEl.textContent = answered;
            passedQuestionsEl.textContent = passed;
            failedQuestionsEl.textContent = failed;

            const rate = total > 0 ? Math.round((answered / total) * 100) : 0;
            document.getElementById("completionRate").textContent = `${rate}%`;
            completionBar.style.width = `${rate}%`;
        }

        function syncRoleAndPortal() {
            const role = testerRoleEl.value;
            portalTypeEl.value = role;
            updateSectionScopeUI();
        }

        function updateSectionScopeUI(filterRole = "admin") {
            sections.forEach((sec) => {
                const el = document.getElementById(sec.id);
                const tag = el.querySelector(`[data-scope-tag="${sec.id}"]`);

                let isMatch = false;
                const targetRole = filterRole.toLowerCase();

                // Role Mapping logic
                const roleLabelMap = {
                    'admin': 'admin',
                    'guru': 'guru',
                    'ortu': 'orang tua',
                    'kepsek': 'kepala sekolah',
                    'it': 'it support'
                };

                const sectionRoles = sec.roles.toLowerCase();
                const targetLabel = roleLabelMap[targetRole] || targetRole;

                if (sectionRoles === "semua role") {
                    isMatch = true;
                } else if (sectionRoles.includes(targetLabel)) {
                    isMatch = true;
                }

                if (isMatch) {
                    el.style.display = "block";
                    el.classList.remove("is-irrelevant");
                    tag.className = "tag state-relevant";
                    tag.textContent = "Relevan";
                    // Auto open based on role match, except for very large lists
                    el.open = true;
                } else {
                    el.style.display = "none";
                    el.classList.add("is-irrelevant");
                }
            });
            updateSummaryCards();
        }

        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                const role = btn.getAttribute("data-role");
                testerRoleEl.value = role; // Sync dropdown
                updateSectionScopeUI(role);
            });
        });

        testerRoleEl.addEventListener("change", () => {
            const role = testerRoleEl.value;
            // Sync tabs
            document.querySelectorAll(".tab-btn").forEach(b => {
                b.classList.toggle("active", b.getAttribute("data-role") === role);
            });
            updateSectionScopeUI(role);
        });

        function buildSummaryTable() {
            summaryTableBody.innerHTML = "";
            failedList.innerHTML = "";

            let rowIndex = 1;
            let failedCount = 0;
            sections.forEach(sec => {
                const el = document.getElementById(sec.id);
                if (el.classList.contains("is-irrelevant")) return;

                sec.questions.forEach(q => {
                    const rb = document.querySelector(`input[name="${q.code}"]:checked`);
                    const note = document.querySelector(`[data-note="${q.code}"]`).value;
                    const res = rb ? rb.value : "pending";

                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                            <td>${rowIndex++}</td>
                            <td>${sec.title}</td>
                            <td>
                                <div>${q.text}</div>
                                ${note ? `<div style="margin-top:5px; font-size:0.8rem; color:var(--text-muted)">Catatan: ${note}</div>` : ""}
                            </td>
                            <td>
                                <span class="result-badge ${res}">${res === 'pass' ? 'BERHASIL' : res === 'fail' ? 'GAGAL' : 'BELUM DIISI'}</span>
                            </td>
                        `;
                    summaryTableBody.appendChild(tr);

                    if (res === "fail") {
                        failedCount++;
                        const li = document.createElement("li");
                        li.textContent = `[${q.code}] ${q.text} ${note ? `- ${note}` : ""}`;
                        failedList.appendChild(li);
                    }
                });
            });

            summaryAlert.textContent = failedCount > 0
                ? `Ditemukan ${failedCount} fitur yang gagal. Segera lakukan perbaikan.`
                : "Semua fitur dalam scope berjalan dengan baik.";
            summaryAlert.className = `summary-alert ${failedCount > 0 ? 'warn' : 'info'}`;
            summaryOutput.classList.add("visible");
        }

        document.getElementById("expandAllBtn").addEventListener("click", () => {
            document.querySelectorAll("details").forEach(d => d.open = true);
        });

        document.getElementById("collapseAllBtn").addEventListener("click", () => {
            document.querySelectorAll("details").forEach(d => d.open = false);
        });

        document.getElementById("resetAnswersBtn").addEventListener("click", () => {
            if (confirm("Reset semua data pengujian?")) location.reload();
        });

        document.getElementById("finishBtn").addEventListener("click", () => {
            buildSummaryTable();
            summaryOutput.scrollIntoView({ behavior: "smooth" });
        });

        document.getElementById("printSummaryBtn").addEventListener("click", () => window.print());

        searchInput.addEventListener("input", (e) => {
            const val = e.target.value.toLowerCase();
            document.querySelectorAll(".question-row").forEach(row => {
                const text = row.getAttribute("data-search");
                row.style.display = text.includes(val) ? "grid" : "none";
            });
        });

        testerRoleEl.addEventListener("change", syncRoleAndPortal);

        document.getElementById("autoFillBtn").addEventListener("click", () => {
            testerNameEl.value = "Tim QA Presensi Pander";
            deviceInfoEl.value = "Chrome Desktop v124 / Windows 11 Pro";
            scenarioInfoEl.value = "Pengujian Akhir Sistem Presensi Pander (Database Sync Mode)";
            generalNotesEl.value = "Secara keseluruhan fungsi inti (Auth, Schedules, Attendance) berjalan sangat baik. Ditemukan beberapa catatan teknis pada modul import massal dan akurasi GPS yang perlu dioptimasi sebelum rilis final.";
            recommendationEl.value = "Sistem Layak Go-Live (dengan catatan perbaikan minor)";

            sections.forEach(sec => {
                sec.questions.forEach(q => {
                    // Skenario Realistis berbasis sistem:
                    // Gagal pada fitur yang biasanya butuh fine-tuning (GPS, Mass Import, Digital Signature)
                    const isFail = ["PRES-04", "KPS-04", "MST-05"].includes(q.code);
                    const val = isFail ? "fail" : "pass";

                    const radio = document.querySelector(`input[name="${q.code}"][value="${val}"]`);
                    if (radio) {
                        radio.checked = true;
                        updateAnswer(q.code, val);
                    }

                    // Isi Catatan Temuan Teknis
                    const noteField = document.querySelector(`[data-note="${q.code}"]`);
                    if (isFail) {
                        if (q.code === "PRES-04") noteField.value = "GPS terkadang meleset 50m di dalam gedung beton. Perlu penyesuaian radius toleransi.";
                        if (q.code === "KPS-04") noteField.value = "Layout tanda tangan pada PDF terpotong jika nama Kepala Sekolah terlalu panjang (>50 karakter).";
                        if (q.code === "MST-05") noteField.value = "Import 5000+ data siswa mengakibatkan load tinggi pada database. Perlu implementasi batch insert.";
                    } else if (["AUTH-01", "MST-01", "JAD-02"].includes(q.code)) {
                        noteField.value = "Terverifikasi sesuai skema database presensipander_db.";
                    }
                });
            });

            buildSummaryTable();
            summaryOutput.scrollIntoView({ behavior: "smooth" });
        });

        renderSections();
        syncRoleAndPortal();
    </script>
</body>

</html>
